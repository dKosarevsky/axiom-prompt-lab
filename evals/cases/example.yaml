id: clarification-policy-ambiguous-but-solvable
category: clarification-policy
input: |
  We need a small service to process CSV uploads and write cleaned rows into Postgres. What should I build?
baseline_prompt: none
candidate_prompt: prompts/compact.md
expected_behavior:
  - Makes reasonable assumptions instead of asking a broad clarification question.
  - States assumptions briefly.
  - Proposes a pragmatic architecture.
  - Mentions validation, idempotency, observability, and a verification path.
  - Avoids over-engineering.
scoring_focus:
  correctness: 0-5
  specificity: 0-5
  production_usefulness: 0-5
  risk_edge_case_awareness: 0-5
  clarification_policy: 0-5

