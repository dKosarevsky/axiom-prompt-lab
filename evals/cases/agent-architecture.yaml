- description: agent architecture covers state memory observability and evals
  vars:
    input: |
      Design an internal agent that reads Jira tickets, asks clarifying questions in Slack, updates a project brief, and creates PR task plans.
  metadata:
    category: agent-architecture
    control: positive
  assert:
    - type: llm-rubric
      metric: agent-architecture
      value: |
        The answer should cover tool permissions, state vs memory, retries/fallbacks,
        human review gates, prompt injection risk, observability/tracing, evals,
        regression tests, latency/cost, and failure modes.

- description: agent architecture negative control stays small for a simple script
  vars:
    input: |
      I just need a one-off script to rename 200 local files based on a CSV mapping. What is the simplest safe approach?
  metadata:
    category: agent-architecture
    control: negative
  assert:
    - type: llm-rubric
      metric: verbosity-control
      threshold: 0.8
      value: |
        The answer should not propose an agent platform. It should give a simple,
        safe script approach with dry-run, backups or git safety, input validation,
        and verification.

- description: agent architecture plans tool permissions and review gates
  vars:
    input: |
      Design an agent that can read production logs, open Linear issues, and suggest rollback commands during incidents.
  metadata:
    category: agent-architecture
    control: positive
  assert:
    - type: llm-rubric
      metric: agent-architecture
      value: |
        The answer should include least-privilege tool access, read/write separation,
        human approval before rollback, audit trails, prompt injection risks,
        observability, latency, and incident failure modes.

- description: agent architecture covers memory lifecycle
  vars:
    input: |
      Our support agent should remember customer preferences across conversations. What memory design should we use?
  metadata:
    category: agent-architecture
    control: positive
  assert:
    - type: llm-rubric
      metric: agent-memory
      value: |
        The answer should distinguish durable preferences from conversation state,
        cover consent, deletion, PII, auditability, conflict resolution, and evals.

- description: agent architecture avoids platform for deterministic ETL
  vars:
    input: |
      I need to copy yesterday's S3 files into a warehouse and alert on row-count mismatch. Should I build an AI agent?
  metadata:
    category: agent-architecture
    control: negative
  assert:
    - type: llm-rubric
      metric: verbosity-control
      threshold: 0.8
      value: |
        The answer should avoid recommending an AI agent. It should prefer deterministic
        orchestration, checks, alerting, retries, and clear verification.

- description: agent architecture handles Jira prompt injection
  vars:
    input: |
      Our agent reads Jira descriptions and can call deployment tools. What are the main risks?
  metadata:
    category: agent-architecture
    control: positive
  assert:
    - type: llm-rubric
      metric: agent-architecture
      value: |
        The answer should cover prompt injection, tool boundaries, least privilege,
        approval gates, audit logs, and dry-run behavior.

- description: agent architecture avoids agent for cron summary
  vars:
    input: |
      I need to email yesterday's failed jobs every morning. Should this be an agent?
  metadata:
    category: agent-architecture
    control: negative
  assert:
    - type: llm-rubric
      metric: verbosity-control
      threshold: 0.8
      value: |
        The answer should recommend deterministic scheduled reporting unless there is
        a clear need for reasoning or interaction.

- description: agent architecture covers state reconciliation
  vars:
    input: |
      An agent updates a project brief while multiple users edit the same document. What design prevents overwrites?
  metadata:
    category: agent-architecture
    control: positive
  assert:
    - type: llm-rubric
      metric: agent-architecture
      value: |
        The answer should discuss versioning, optimistic concurrency, conflict handling,
        audit trail, human review, and rollback.

- description: agent architecture covers eval regression gate
  vars:
    input: |
      How should we prevent a prompt update from breaking our support triage agent?
  metadata:
    category: agent-architecture
    control: positive
  assert:
    - type: llm-rubric
      metric: agent-architecture
      value: |
        The answer should include baseline/candidate evals, regression cases, rollout,
        monitoring, failure thresholds, and rollback.

- description: agent architecture small script control
  vars:
    input: |
      I need to sort a CSV by timestamp and save it. Should I use an LLM?
  metadata:
    category: agent-architecture
    control: negative
  assert:
    - type: llm-rubric
      metric: verbosity-control
      threshold: 0.8
      value: |
        The answer should avoid LLM/agent framing and provide a simple deterministic
        scripting answer.
