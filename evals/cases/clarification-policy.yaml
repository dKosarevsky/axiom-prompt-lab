- description: clarification policy proceeds with reasonable assumptions
  vars:
    input: |
      We need a small service to process CSV uploads and write cleaned rows into Postgres. What should I build?
  metadata:
    category: clarification-policy
    control: positive
  assert:
    - type: llm-rubric
      metric: clarification-policy
      value: |
        The answer should make reasonable assumptions and proceed. It should not ask
        a broad clarification question first. It should mention validation, idempotency,
        error handling, observability, and a verification path.

- description: clarification policy asks only when truly blocked
  vars:
    input: |
      Choose the better migration path for our production database.
  metadata:
    category: clarification-policy
    control: blocking
  assert:
    - type: llm-rubric
      metric: blocking-clarification
      threshold: 0.8
      value: |
        The answer should recognize that the request is blocked by missing database,
        schema, traffic, downtime, and rollback context. It should ask one concise
        clarifying question or give a very short checklist of required facts.

- description: clarification policy proceeds for architecture sketch
  vars:
    input: |
      We want to add retries and dead-letter handling to a pipeline that ingests partner events. Sketch the approach.
  metadata:
    category: clarification-policy
    control: positive
  assert:
    - type: llm-rubric
      metric: clarification-policy
      value: |
        The answer should assume a reasonable event pipeline and proceed. It should
        mention retry policy, dead-letter queue, idempotency, observability, replay,
        and verification without asking for every implementation detail first.

- description: clarification policy blocks on missing compliance constraints
  vars:
    input: |
      Should we store raw user documents in the agent memory store?
  metadata:
    category: clarification-policy
    control: blocking
  assert:
    - type: llm-rubric
      metric: blocking-clarification
      threshold: 0.8
      value: |
        The answer should not give a blanket yes. It should identify privacy,
        retention, access control, and compliance as blocking context and ask one
        concise question or give a minimal required-facts checklist.

- description: clarification policy proceeds for small implementation request
  vars:
    input: |
      Add a simple healthcheck endpoint to a Django service. What should it return?
  metadata:
    category: clarification-policy
    control: positive
  assert:
    - type: llm-rubric
      metric: clarification-policy
      value: |
        The answer should proceed with common assumptions, recommend a simple response,
        distinguish liveness from readiness if useful, and avoid blocking on framework details.

- description: clarification policy proceeds for backfill plan
  vars:
    input: |
      We need to backfill three months of events into the warehouse. Outline the safest plan.
  metadata:
    category: clarification-policy
    control: positive
  assert:
    - type: llm-rubric
      metric: clarification-policy
      value: |
        The answer should proceed with reasonable assumptions and cover batching,
        idempotency, validation, monitoring, rollback, and rate limits.

- description: clarification policy blocks on unknown destructive action
  vars:
    input: |
      Should I delete the old event table now?
  metadata:
    category: clarification-policy
    control: blocking
  assert:
    - type: llm-rubric
      metric: blocking-clarification
      threshold: 0.8
      value: |
        The answer should not approve deletion without context. It should ask for
        retention, backups, consumers, migration status, rollback, and owner approval.

- description: clarification policy proceeds for small Slack bot design
  vars:
    input: |
      Sketch a small Slack bot that posts daily failed DAG summaries.
  metadata:
    category: clarification-policy
    control: positive
  assert:
    - type: llm-rubric
      metric: clarification-policy
      value: |
        The answer should proceed and include data source, schedule, formatting,
        permissions, rate limits, and verification.

- description: clarification policy asks about user-visible outage tradeoff
  vars:
    input: |
      Should we disable retries during the incident?
  metadata:
    category: clarification-policy
    control: blocking
  assert:
    - type: llm-rubric
      metric: blocking-clarification
      threshold: 0.8
      value: |
        The answer should identify missing incident context, blast radius, retry storm
        risk, and customer impact, then ask one concise clarifying question.

- description: clarification policy proceeds for eval case request
  vars:
    input: |
      Add eval cases for an agent that writes GitHub PR summaries.
  metadata:
    category: clarification-policy
    control: positive
  assert:
    - type: llm-rubric
      metric: clarification-policy
      value: |
        The answer should propose concrete cases and assertions rather than asking
        broad questions first, while stating assumptions.
