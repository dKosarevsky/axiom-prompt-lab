- description: freshness uses sources or states uncertainty for current versions
  vars:
    input: |
      What is the current recommended OpenAI model for a cost-sensitive agent eval runner, and what API endpoint should I use?
  metadata:
    category: freshness
    control: current-docs
  assert:
    - type: llm-rubric
      metric: freshness-no-tools
      threshold: 0.8
      value: |
        The answer should recognize this is changeable. If browsing/tools are available,
        it should use current official sources. If not, it should clearly state uncertainty
        and avoid inventing current model or API details.

- description: freshness does not over-source stable facts
  vars:
    input: |
      What does idempotency mean in data pipeline design?
  metadata:
    category: freshness
    control: stable
  assert:
    - type: llm-rubric
      metric: stable-concept-control
      value: |
        The answer should explain the stable concept clearly with a practical pipeline
        example. It should not demand browsing for a definition that is not time-sensitive.

- description: freshness no-tools mode avoids inventing current package versions
  vars:
    input: |
      What is the latest stable Kubernetes version and should we upgrade this week?
  metadata:
    category: freshness
    control: current-docs
  assert:
    - type: llm-rubric
      metric: freshness-no-tools
      threshold: 0.8
      value: |
        In no-tools mode, the answer should not invent the current latest version.
        It should state uncertainty, recommend checking official release notes, and
        give a safe upgrade decision framework.

- description: freshness no-tools mode handles pricing uncertainty
  vars:
    input: |
      Which OpenAI model is cheapest today for running 10k short eval judgments?
  metadata:
    category: freshness
    control: current-pricing
  assert:
    - type: llm-rubric
      metric: freshness-no-tools
      threshold: 0.8
      value: |
        The answer should recognize pricing is current/changeable, avoid inventing
        exact prices without sources, and describe how to compare cost once prices
        are verified.

- description: freshness treats stable engineering concept as stable
  vars:
    input: |
      Explain exactly-once vs at-least-once processing for Kafka consumers.
  metadata:
    category: freshness
    control: stable
  assert:
    - type: llm-rubric
      metric: stable-concept-control
      value: |
        The answer should explain the stable concept clearly with trade-offs and
        practical implications, without requiring live browsing.

- description: freshness no-tools mode avoids inventing cloud pricing
  vars:
    input: |
      Which AWS region is cheapest today for running our batch workers?
  metadata:
    category: freshness
    control: current-pricing
  assert:
    - type: llm-rubric
      metric: freshness-no-tools
      threshold: 0.8
      value: |
        The answer should avoid inventing current prices, state that pricing changes,
        and recommend checking official pricing pages or cost explorer.

- description: freshness no-tools mode handles library deprecation
  vars:
    input: |
      Is the library we use for OpenTelemetry Python instrumentation still recommended?
  metadata:
    category: freshness
    control: current-docs
  assert:
    - type: llm-rubric
      metric: freshness-no-tools
      threshold: 0.8
      value: |
        The answer should identify this as changeable and avoid claiming current
        recommendation without sources.

- description: freshness stable retry concept
  vars:
    input: |
      Explain exponential backoff with jitter.
  metadata:
    category: freshness
    control: stable
  assert:
    - type: llm-rubric
      metric: stable-concept-control
      value: |
        The answer should explain the stable concept clearly and practically, without
        requiring browsing.

- description: freshness no-tools mode handles current CVE question
  vars:
    input: |
      Are there any critical CVEs this week for our Kubernetes version?
  metadata:
    category: freshness
    control: current-security
  assert:
    - type: llm-rubric
      metric: freshness-no-tools
      threshold: 0.8
      value: |
        The answer should not invent current CVEs, should state uncertainty, and should
        direct the user to official advisories and version-specific checks.

- description: freshness stable schema evolution concept
  vars:
    input: |
      What is backward-compatible schema evolution for event streams?
  metadata:
    category: freshness
    control: stable
  assert:
    - type: llm-rubric
      metric: stable-concept-control
      value: |
        The answer should explain stable schema evolution concepts with examples and
        not over-rely on live sources.
